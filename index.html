<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应商管理与价格预测系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }
        .tab:hover {
            background: #f5f5f5;
        }
        .tab.active {
            border-bottom-color: #667eea;
            color: #667eea;
            font-weight: bold;
        }
        .content {
            padding: 30px;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin: 5px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }
        .stat-card p {
            opacity: 0.9;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .success {
            background: #efe;
            color: #3c3;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .api-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .api-status.online {
            background: #4caf50;
        }
        .api-status.offline {
            background: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>供应商管理与价格预测系统</h1>
            <p>基于机器学习的智能价格预测平台</p>
            <p style="margin-top: 10px;">
                <span class="api-status" id="apiStatus"></span>
                <span id="apiStatusText">检查API连接...</span>
            </p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showSection('suppliers')">供应商管理</div>
            <div class="tab" onclick="showSection('stats')">数据统计</div>
            <div class="tab" onclick="showSection('prediction')">价格预测</div>
        </div>

        <div class="content">
            <!-- 供应商管理 -->
            <div id="suppliers" class="section active">
                <h2>供应商列表</h2>
                <button class="btn" onclick="loadSuppliers()">刷新</button>
                <button class="btn" onclick="showAddSupplierForm()">添加供应商</button>

                <div id="addSupplierForm" style="display: none; margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 10px;">
                    <h3>添加新供应商</h3>
                    <div class="form-group">
                        <label>名称</label>
                        <input type="text" id="supplierName">
                    </div>
                    <div class="form-group">
                        <label>联系人</label>
                        <input type="text" id="contactPerson">
                    </div>
                    <div class="form-group">
                        <label>电话</label>
                        <input type="text" id="phone">
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="email">
                    </div>
                    <div class="form-group">
                        <label>地址</label>
                        <input type="text" id="address">
                    </div>
                    <div class="form-group">
                        <label>产品类型</label>
                        <input type="text" id="productType">
                    </div>
                    <div class="form-group">
                        <label>信用评分 (0-5)</label>
                        <input type="number" id="creditRating" min="0" max="5" step="0.1" value="4.0">
                    </div>
                    <button class="btn" onclick="addSupplier()">保存</button>
                    <button class="btn" onclick="hideAddSupplierForm()">取消</button>
                </div>

                <div id="suppliersList"></div>
            </div>

            <!-- 数据统计 -->
            <div id="stats" class="section">
                <h2>数据统计</h2>
                <div class="stats" id="statsCards"></div>
            </div>

            <!-- 价格预测 -->
            <div id="prediction" class="section">
                <h2>价格预测</h2>
                <p style="color: #666; margin-bottom: 20px;">基于历史价格和天气数据，使用线性回归模型预测未来价格走势</p>

                <div class="form-group">
                    <label>选择供应商</label>
                    <select id="predictionSupplier">
                        <option value="">请选择供应商</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>预测天数</label>
                    <select id="predictionDays">
                        <option value="7">7天</option>
                        <option value="14">14天</option>
                        <option value="30">30天</option>
                    </select>
                </div>

                <button class="btn" onclick="getPrediction()">开始预测</button>

                <div id="predictionResult"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        // 检查API连接
        async function checkApiStatus() {
            try {
                const response = await fetch(`${API_BASE}/`);
                if (response.ok) {
                    document.getElementById('apiStatus').className = 'api-status online';
                    document.getElementById('apiStatusText').textContent = 'API已连接';
                    return true;
                }
            } catch (error) {
                console.error('API连接失败:', error);
            }
            document.getElementById('apiStatus').className = 'api-status offline';
            document.getElementById('apiStatusText').textContent = 'API未连接';
            return false;
        }

        // 加载供应商列表
        async function loadSuppliers() {
            const container = document.getElementById('suppliersList');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch(`${API_BASE}/suppliers/`);
                const suppliers = await response.json();

                if (suppliers.length === 0) {
                    container.innerHTML = '<p>暂无供应商数据</p>';
                    return;
                }

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>名称</th>
                                <th>联系人</th>
                                <th>电话</th>
                                <th>邮箱</th>
                                <th>产品类型</th>
                                <th>信用评分</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                suppliers.forEach(s => {
                    html += `
                        <tr>
                            <td>${s.id}</td>
                            <td>${s.name}</td>
                            <td>${s.contact_person}</td>
                            <td>${s.phone}</td>
                            <td>${s.email}</td>
                            <td>${s.product_type}</td>
                            <td>${s.credit_rating}</td>
                            <td>
                                <button class="btn" onclick="deleteSupplier(${s.id})">删除</button>
                            </td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                container.innerHTML = html;

                // 更新预测下拉框
                updateSupplierSelect(suppliers);

            } catch (error) {
                container.innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
            }
        }

        // 更新供应商下拉框
        function updateSupplierSelect(suppliers) {
            const select = document.getElementById('predictionSupplier');
            select.innerHTML = '<option value="">请选择供应商</option>';
            suppliers.forEach(s => {
                select.innerHTML += `<option value="${s.id}">${s.name} - ${s.product_type}</option>`;
            });
        }

        // 显示添加供应商表单
        function showAddSupplierForm() {
            document.getElementById('addSupplierForm').style.display = 'block';
        }

        // 隐藏添加供应商表单
        function hideAddSupplierForm() {
            document.getElementById('addSupplierForm').style.display = 'none';
        }

        // 添加供应商
        async function addSupplier() {
            const data = {
                name: document.getElementById('supplierName').value,
                contact_person: document.getElementById('contactPerson').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                address: document.getElementById('address').value,
                product_type: document.getElementById('productType').value,
                credit_rating: parseFloat(document.getElementById('creditRating').value)
            };

            try {
                const response = await fetch(`${API_BASE}/suppliers/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('供应商添加成功！');
                    hideAddSupplierForm();
                    loadSuppliers();
                } else {
                    throw new Error('添加失败');
                }
            } catch (error) {
                alert('添加失败: ' + error.message);
            }
        }

        // 删除供应商
        async function deleteSupplier(id) {
            if (!confirm('确定要删除这个供应商吗？')) return;

            try {
                const response = await fetch(`${API_BASE}/suppliers/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('删除成功！');
                    loadSuppliers();
                } else {
                    throw new Error('删除失败');
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        // 获取统计数据
        async function loadStats() {
            const container = document.getElementById('statsCards');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch(`${API_BASE}/suppliers/`);
                const suppliers = await response.json();

                container.innerHTML = `
                    <div class="stat-card">
                        <h3>${suppliers.length}</h3>
                        <p>供应商总数</p>
                    </div>
                    <div class="stat-card">
                        <h3>${suppliers.length > 0 ? Math.max(...suppliers.map(s => s.credit_rating)).toFixed(1) : 'N/A'}</h3>
                        <p>最高信用评分</p>
                    </div>
                    <div class="stat-card">
                        <h3>${suppliers.length > 0 ? (suppliers.reduce((sum, s) => sum + s.credit_rating, 0) / suppliers.length).toFixed(1) : 'N/A'}</h3>
                        <p>平均信用评分</p>
                    </div>
                    <div class="stat-card">
                        <h3>${[...new Set(suppliers.map(s => s.product_type))].length || 0}</h3>
                        <p>产品类型数</p>
                    </div>
                `;

            } catch (error) {
                container.innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
            }
        }

        // 获取价格预测
        async function getPrediction() {
            const supplierId = document.getElementById('predictionSupplier').value;
            const days = document.getElementById('predictionDays').value;
            const container = document.getElementById('predictionResult');

            if (!supplierId) {
                alert('请选择供应商');
                return;
            }

            container.innerHTML = '<div class="loading">预测中...</div>';

            try {
                // 首先获取供应商信息
                const supplierResponse = await fetch(`${API_BASE}/suppliers/${supplierId}`);
                const supplier = await supplierResponse.json();

                const response = await fetch(`${API_BASE}/prediction/price`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        supplier_id: parseInt(supplierId),
                        product_name: supplier.product_type,
                        days_ahead: parseInt(days)
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    displayPrediction(result);
                } else {
                    const error = await response.json();
                    throw new Error(error.detail || '预测失败');
                }

            } catch (error) {
                container.innerHTML = `<div class="error">预测失败: ${error.message}</div>`;
            }
        }

        // 显示预测结果
        function displayPrediction(result) {
            const container = document.getElementById('predictionResult');

            if (result.predictions.length === 0) {
                container.innerHTML = '<div class="error">没有足够的预测数据</div>';
                return;
            }

            let html = `
                <h3 style="margin-top: 20px;">预测结果</h3>
                <div class="success" style="margin-top: 10px;">
                    <strong>模型评估指标:</strong><br>
                    MSE: ${result.metrics.mse?.toFixed(2) || 'N/A'}<br>
                    R²: ${result.metrics.r2?.toFixed(4) || 'N/A'}
                </div>

                <table style="margin-top: 20px;">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>预测价格</th>
                            <th>置信度</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            result.predictions.forEach(p => {
                html += `
                    <tr>
                        <td>${p.date}</td>
                        <td>¥${p.predicted_price}</td>
                        <td>${p.confidence}%</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // 切换标签页
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');

            if (sectionId === 'stats') {
                loadStats();
            }
        }

        // 页面加载完成后初始化
        window.onload = async function() {
            await checkApiStatus();
            await loadSuppliers();
        };
    </script>
</body>
</html>
